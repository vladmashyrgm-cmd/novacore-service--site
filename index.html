    <script type="module">

        import { signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        import { push, ref } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";



        // VŠECHNY TVÉ PROMĚNNÉ A PŘEKLADY...

        const ADMIN_USERNAME = "admin";

        const ADMIN_PASSWORD = "V9#Discord2026!";

        let currentAuthAction = 'login';

        window.currentAuthAction = 'login';

        let loggedInUser = null;

        let currentLang = 'cs';

        window.currentLang = 'cs';



        const translations = { /* SEM VLOŽ TEN SVŮJ VELKÝ OBJEKT TRANSLATIONS */ };

        window.translations = translations;



        // FUNKCE AUTH (PŘEPOJENÁ NA FIREBASE)

        window.handleAuthSubmit = async function() {

            const user = document.getElementById('authUsername').value.trim();

            const pass = document.getElementById('authPassword').value.trim();

            const t = translations[currentLang];

            try {

                if (window.currentAuthAction === 'register') {

                    await createUserWithEmailAndPassword(window.auth, user, pass);

                    showToast("✅ Registrace úspěšná!");

                    openAuthModal('login');

                } else {

                    await signInWithEmailAndPassword(window.auth, user, pass);

                    loggedInUser = user;

                    showToast("👋 Vítej zpět!");

                    closeAuthModal();

                    checkUserSession();

                }

            } catch (e) { showToast("❌ Chyba: " + e.message); }

        };



        // FUNKCE OBJEDNÁVKA (ZÁPIS DO FIREBASE DB)

        window.submitOrder = async function() {

            const pack = document.getElementById('selectedPackage').value;

            const name = document.getElementById('orderName').value;

            try {

                await push(ref(window.db, 'objednavky/'), {

                    uzivatel: window.auth.currentUser ? window.auth.currentUser.email : "Anonym",

                    balicek: pack,

                    jmeno: name,

                    datum: new Date().toISOString()

                });

                showToast("✅ Objednávka uložena do databáze!");

                closeOrderModal();

            } catch (e) { showToast("❌ Chyba DB: " + e.message); }

        };



        // ZBYTEK TVÝCH FUNKCÍ (TOGGLE THEME, RENDER FAQ, INIT PARTICLES ATD...)

        // Sem vlož vše ostatní, co jsi poslal v posledních zprávách...

        // 1. Změna jazyka a aktualizace textů na stránce

window.changeLanguage = function(lang) {

    currentLang = lang;

    localStorage.setItem('lang', lang);

    const t = translations[lang];

    document.getElementById('heroTitle').innerText = t.heroT;

    document.getElementById('heroText').innerText = t.heroP;

    document.getElementById('faqTitle').innerText = t.faqTitle;

    // ... a tak dále pro všechny prvky, které jsi měl v původním kódu ...

    renderFeatures();

    renderFAQ();

};



// 2. Vykreslování balíčků a FAQ

function renderFeatures() {

    const p = translations[currentLang].packages;

    for(let i = 1; i <= 4; i++) {

        const list = document.getElementById('features' + i);

        if(!list) continue;

        list.innerHTML = '';

        p['p'+i].forEach(feat => {

            const li = document.createElement('li');

            li.innerHTML = `<i class="fas fa-check" style="color:var(--green)"></i> ` + feat;

            list.appendChild(li);

        });

    }

}



function renderFAQ() {

    const container = document.getElementById('faqContainer');

    if(!container) return;

    container.innerHTML = '';

    translations[currentLang].faqs.forEach(faq => {

        const item = document.createElement('div');

        item.className = 'faq-item';

        item.innerHTML = `

            <div class="faq-question" onclick="toggleFaq(this)">${faq.q} <i class="fas fa-chevron-down"></i></div>

            <div class="faq-answer"><p style="padding-bottom:20px;">${faq.a}</p></div>

        `;

        container.appendChild(item);

    });

}



// 3. Přepínání FAQ (otvírání odpovědí)

window.toggleFaq = function(el) {

    const answer = el.nextElementSibling;

    if(answer.style.maxHeight) {

        answer.style.maxHeight = null;

        el.querySelector('i').className = 'fas fa-chevron-down';

    } else {

        answer.style.maxHeight = answer.scrollHeight + "px";

        el.querySelector('i').className = 'fas fa-chevron-up';

    }

};



// 4. Přepínání vzhledu (Dark/Light mode)

window.toggleTheme = function() {

    const newTheme = document.body.getAttribute('data-theme') === 'light' ? 'dark' : 'light';

    document.body.setAttribute('data-theme', newTheme);

    localStorage.setItem('theme', newTheme);

};



// 5. Toast notifikace (bublinky s informací)

window.showToast = function(message) {

    const container = document.getElementById('toastContainer');

    const toast = document.createElement('div');

    toast.className = 'toast';

    toast.innerHTML = message;

    container.appendChild(toast);

    setTimeout(() => {

        toast.style.opacity = '0';

        setTimeout(() => toast.remove(), 300);

    }, 4000);

};

}
