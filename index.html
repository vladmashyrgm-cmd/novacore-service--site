<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>NovaCore | Discord Studio</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        body { background: #0a0a0c; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; width: 100%; max-width: 1000px; margin-top: 40px; }
        .card { background: rgba(25, 27, 38, 0.8); padding: 30px; border-radius: 20px; border: 1px solid #5865F2; text-align: center; }
        button { background: #5865F2; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <h1>NovaCore 2026</h1>
    <div class="container" id="packages"></div>

    <script>
        // TVOJE KONFIGURACE
        const firebaseConfig = {
            apiKey: "1:341391749799:web:c4f99308cca340981d2182",
            databaseURL: "https://novacorecz-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "novacorecz",
            appId: "1:341391749799:web:c4f99308cca340981d2182"
        };
        firebase.initializeApp(firebaseConfig);

        const packages = [
            { name: "Start", price: "300 Kč" },
            { name: "Medium", price: "750 Kč" },
            { name: "Pro", price: "1500 Kč" }
        ];

        const container = document.getElementById('packages');
        container.innerHTML = packages.map(p => `
            <div class="card">
                <h3>${p.name}</h3>
                <p>Cena: ${p.price}</p>
                <button onclick="order('${p.name}', '${p.price}')">Objednat</button>
            </div>
        `).join('');

        function order(name, price) {
            firebase.database().ref('objednavky/').push({
                balicek: name,
                cena: price,
                datum: new Date().toLocaleString()
            }).then(() => {
                alert("Objednávka " + name + " byla uložena!");
            });
        }
    </script>
</body>
</html>
